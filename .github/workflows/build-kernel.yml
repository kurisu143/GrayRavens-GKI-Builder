name: Build kernel
on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (VANILLA = build with no KSU at all)'
        type: choice
        options:
          - KOWSU
          - KSUN
          - KSUN_ALL_MANAGERS
          - VANILLA
        default: KOWSU
      clang_variant:
        description: 'Clang toolchain to use'
        type: choice
        options:
          - CLANG_12
          - NEUTRON_19
        default: CLANG_12
      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: android12-5.10
      kernel_name:
        description: 'Kernel zip name (without .zip)'
        type: string
        default: GrayRavens-Zenithed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo (build.sh lives here)
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget

      - name: Cache Clang 12 (kernel.org)
        if: inputs.clang_variant == 'CLANG_12'
        id: cache-clang-12
        uses: actions/cache@v4
        with:
          path: ~/toolchain/clang-12.0.1
          key: llvm-12.0.1-x86_64

      - name: Download Clang 12 (if not cached)
        if: inputs.clang_variant == 'CLANG_12' && steps.cache-clang-12.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/toolchain/clang-12.0.1
          curl -L "https://mirrors.edge.kernel.org/pub/tools/llvm/files/llvm-12.0.1-x86_64.tar.gz" \
            | tar -xz --strip-components=1 -C ~/toolchain/clang-12.0.1
          echo "Clang 12.0.1 downloaded."

      - name: Download Neutron Clang 19
        if: inputs.clang_variant == 'NEUTRON_19'
        run: |
          mkdir -p ~/toolchain/neutron-clang
          bash <(curl -s https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman) \
            --sync=19 -D ~/toolchain/neutron-clang
          echo "Neutron Clang 19 downloaded."

      - name: Export CLANG_PATH
        run: |
          if [ "${{ inputs.clang_variant }}" = "CLANG_12" ]; then
            echo "CLANG_PATH=$HOME/toolchain/clang-12.0.1" >> $GITHUB_ENV
          else
            echo "CLANG_PATH=$HOME/toolchain/neutron-clang" >> $GITHUB_ENV
          fi

      - name: Shallow-clone kernel source
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" \
            https://github.com/XTENSEI/kernel_common_5.10 kernel

      - name: Apply KernelSU (${{ inputs.ksu_variant }})
        if: inputs.ksu_variant != 'VANILLA'
        working-directory: kernel
        run: |
          if [ "${{ inputs.ksu_variant }}" = "KOWSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=n\n' \
              >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=y\n' \
              >> arch/arm64/configs/gki_defconfig
          fi

      - name: Verify KSU integration
        if: inputs.ksu_variant != 'VANILLA'
        working-directory: kernel
        run: |
          echo "=== KSU directory check ==="
          ls -la KernelSU* 2>/dev/null || echo "WARNING: No KernelSU dir found!"
          echo "=== drivers/kernelsu check ==="
          ls drivers/kernelsu/ 2>/dev/null || echo "WARNING: drivers/kernelsu missing!"
          echo "=== Kconfig/Makefile hooks ==="
          grep -r "kernelsu\|KSU" drivers/Makefile drivers/Kconfig 2>/dev/null || echo "WARNING: No KSU hooks in drivers!"
          echo "=== gki_defconfig KSU entries ==="
          grep "CONFIG_KSU" arch/arm64/configs/gki_defconfig || echo "WARNING: No KSU configs in gki_defconfig!"

      - name: Apply All Managers Support patch (KSUN_ALL_MANAGERS only)
        if: inputs.ksu_variant == 'KSUN_ALL_MANAGERS'
        working-directory: kernel
        run: |
          echo "Patching All Managers Support..."
          curl -LSs "https://raw.githubusercontent.com/XTENSEI/gki-builder/refs/heads/6.x/kernel-patches/ksu/ksun-add-more-managers-support.patch" \
            -o /tmp/ksun-add-more-managers-support.patch
          if [ -d KernelSU-Next ]; then
            cd KernelSU-Next
            echo "Current KernelSU-Next branch: $(git branch --show-current)"
            grep MANAGER_LIST kernel/Kbuild || true
            patch -p1 < /tmp/ksun-add-more-managers-support.patch
            echo "Patch applied. New MANAGER_LIST:"
            grep MANAGER_LIST kernel/Kbuild || true
          else
            echo "ERROR: KernelSU-Next directory not found!"
            exit 1
          fi

      - name: Apply SUSFS patches (KSUN-based variants only)
        if: inputs.ksu_variant == 'KSUN' || inputs.ksu_variant == 'KSUN_ALL_MANAGERS'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r "$susfs/fs" .
          cp -r "$susfs/include" .
          cp -r "$susfs/50_add_susfs_in_gki-android12-5.10.patch" .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

      - name: Run build.sh
        working-directory: kernel
        env:
          CLANG_PATH: ${{ env.CLANG_PATH }}
          CLANG_VARIANT: ${{ inputs.clang_variant }}
        run: |
          cp "$GITHUB_WORKSPACE/build.sh" .
          chmod +x build.sh
          ./build.sh

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/XTENSEI/GrayRavens-anykernel anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/Image
          cd anykernel
          zip -r9 "../${{ inputs.kernel_name }}-${{ inputs.ksu_variant }}-${{ inputs.clang_variant }}.zip" . \
            --exclude="*.git*" --exclude="README.md" --exclude="*.placeholder"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.ksu_variant }}-${{ inputs.clang_variant }}-${{ inputs.kernel_ref }}
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: error

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernel_name }}-${{ inputs.ksu_variant }}-${{ inputs.clang_variant }}
          path: ${{ inputs.kernel_name }}-${{ inputs.ksu_variant }}-${{ inputs.clang_variant }}.zip
          if-no-files-found: error
