  check-neutron-19:
    name: "Neutron clang 19"
    runs-on: ubuntu-latest
    steps:
      - name: Download & extract
        run: |
          mkdir -p clang
          # Get latest Neutron clang 19 release
          NEUTRON_URL=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest \
            | grep "browser_download_url" \
            | grep "neutron-clang" \
            | grep "tar.zst\|tar.gz" \
            | head -n1 \
            | cut -d '"' -f 4)
          echo "Downloading: $NEUTRON_URL"
          wget -q "$NEUTRON_URL" -O clang.tar.zst || wget -q "$NEUTRON_URL" -O clang.tar.gz
          # Try zst first, fallback to gz
          if file clang.tar.zst 2>/dev/null | grep -q "Zstandard"; then
            apt-get install -y zstd -qq
            tar -I zstd -xf clang.tar.zst -C clang
          else
            tar xf clang.tar.gz -C clang 2>/dev/null || true
          fi
      - name: Run checks
        if: always()
        run: |
          CLANG=$(find ./clang -name "clang" -type f | head -n1)
          echo "=============================="
          echo " Neutron clang 19"
          echo "=============================="
          echo ""

          echo "── Version ──────────────────────────────────────────"
          $CLANG --version

          echo ""
          echo "── Optimization features ────────────────────────────"

          if $CLANG -mllvm -polly -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] Polly          — polyhedral loop optimizer"
