name: Clang Optimization Checker

on:
  workflow_dispatch:
    inputs:
      clang_url:
        description: "Clang tarball URL to test"
        required: false
        default: ""
      clang_variant:
        description: "Clang variant label (for display)"
        required: false
        default: "custom"

jobs:
  check-aosp-r536225:
    name: "AOSP r536225 (clang 19)"
    runs-on: ubuntu-latest
    steps:
      - name: Download & extract
        run: |
          mkdir -p clang
          wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz" -O clang.tar.gz
          tar xf clang.tar.gz -C clang
      - name: Run checks
        run: bash <(curl -fsSL https://raw.githubusercontent.com/XTENSEI/GrayRavens-GKI-Builder/master/check-clang.sh) ./clang
        continue-on-error: true
      - name: Inline check (fallback)
        if: always()
        run: |
          CLANG=./clang/bin/clang
          echo "=============================="
          echo " AOSP clang-r536225 (clang 19)"
          echo "=============================="
          echo ""

          echo "── Version ──────────────────────────────────────────"
          $CLANG --version

          echo ""
          echo "── Optimization features ────────────────────────────"

          # Polly
          if $CLANG -mllvm -polly -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] Polly          — polyhedral loop optimizer"
          else
            echo "  [✗] Polly          — not compiled in"
          fi

          # BOLT (check for llvm-bolt binary)
          if [ -f ./clang/bin/llvm-bolt ]; then
            echo "  [✓] BOLT           — $(./clang/bin/llvm-bolt --version 2>/dev/null | head -n1)"
          else
            echo "  [✗] BOLT           — binary not found"
          fi

          # LTO
          if $CLANG -flto=thin -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] ThinLTO        — supported"
          else
            echo "  [✗] ThinLTO        — not supported"
          fi
          if $CLANG -flto=full -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] Full LTO       — supported"
          else
            echo "  [✗] Full LTO       — not supported"
          fi

          # PGO
          if $CLANG -fprofile-generate -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] PGO            — profile generate supported"
          else
            echo "  [✗] PGO            — not supported"
          fi

          # MLGO — check for TFLite model embedded in binary
          if strings ./clang/bin/clang 2>/dev/null | grep -q "MLGOHeuristic\|mlgo\|tflite\|regalloc_model"; then
            echo "  [✓] MLGO           — TFLite model embedded in binary"
          else
            echo "  [✗] MLGO           — no embedded model found"
          fi

          # Sanitizers
          if $CLANG -fsanitize=address -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] ASan           — address sanitizer supported"
          else
            echo "  [✗] ASan           — not supported"
          fi

          # O3
          if $CLANG -O3 -x c /dev/null -o /dev/null 2>/dev/null; then
            echo "  [✓] O3             — supported"
          else
            echo "  [✗] O3             — not supported"
          fi

          # AArch64 ISA extensions
          echo ""
          echo "── AArch64 ISA support ──────────────────────────────"
          for feat in armv8.2-a armv8.2-a+dotprod armv8.2-a+fp16 armv8.2-a+crypto armv8.2-a+crypto+fp16+dotprod; do
            if $CLANG -march=$feat -x c /dev/null -o /dev/null 2>/dev/null; then
              echo "  [✓] -march=$feat"
            else
              echo "  [✗] -march=$feat"
            fi
          done

          # Linker
          echo ""
          echo "── Linker ───────────────────────────────────────────"
          if [ -f ./clang/bin/ld.lld ]; then
            echo "  [✓] LLD            — $(./clang/bin/ld.lld --version 2>/dev/null | head -n1)"
          else
            echo "  [✗] LLD            — not found"
          fi

          # llvm-objcopy / llvm-strip
          for tool in llvm-objcopy llvm-strip llvm-ar llvm-nm llvm-readelf; do
            if [ -f ./clang/bin/$tool ]; then
              echo "  [✓] $tool"
            else
              echo "  [✗] $tool — not found"
            fi
          done

          echo ""
          echo "────────────────────────────────────────────────────"
          echo "Done."

